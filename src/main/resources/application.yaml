spring:
  profiles:
    active: dev

  application:
    name: chime

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway manages schema, not Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: your-super-secret-key-change-this-in-production-must-be-long
    access-token-expiry: 900000        # 15 minutes in ms
    refresh-token-expiry: 604800000    # 7 days in ms
