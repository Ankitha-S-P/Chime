spring:
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  data:
    redis:
      url: ${REDIS_URL}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.ankitha: INFO
    org.springframework.security: WARN
